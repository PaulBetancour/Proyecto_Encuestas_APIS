<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="API de Gestión de Encuestas Poblacionales - Proyecto FastAPI con Pydantic y validación de datos estadísticos.">
    <title>API de Encuestas Poblacionales</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'Helvetica Neue', 'Arial', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        primary: '#3D008D',
                        secondary: '#ED1E79',
                        navy: '#001A4D',
                        gold: '#FDB913',
                        bg: '#F8FAFC',
                        surface: '#FFFFFF',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #F8FAFC;
            color: #1E293B;
            scroll-behavior: smooth;
        }

        code, pre {
            font-family: 'Fira Code', monospace;
        }

        .gradient-usta {
            background: linear-gradient(140deg, #3D008D 0%, #ED1E79 100%);
        }

        .header-usta {
            background: linear-gradient(180deg, #001A4D 0%, #002868 100%);
        }

        .card-usta {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .card-usta:hover {
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
        }

        .chip-box {
            background: linear-gradient(135deg, rgba(61, 0, 141, 0.08) 0%, rgba(237, 30, 121, 0.08) 100%);
            border: 1px solid rgba(61, 0, 141, 0.2);
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(61, 0, 141, 0.15) 0%, transparent 100%);
            border-left: 4px solid #ED1E79;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #3D008D, #ED1E79);
            border-radius: 4px;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .code-block {
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .code-block pre {
            margin: 0;
            padding: 16px;
            overflow-x: auto;
            color: #d4d4d4;
            line-height: 1.5;
        }

        .syntax-kwd {
            color: #569cd6;
        }

        .syntax-str {
            color: #ce9178;
        }

        .syntax-com {
            color: #6a9955;
        }

        .syntax-func {
            color: #dcdcaa;
        }

        .syntax-num {
            color: #b5cea8;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-done {
            background-color: #dcfce7;
            color: #166534;
        }

        .status-pending {
            background-color: #fef3c7;
            color: #92400e;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            BookOpen: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
            ),
            Server: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                    <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                    <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                    <line x1="6" y1="6" x2="6.01" y2="6"></line>
                    <line x1="6" y1="18" x2="6.01" y2="18"></line>
                </svg>
            ),
            Database: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                    <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                    <path d="M3 5v14c0 1.66 4 3 9 3s 9-1.34 9-3V5"></path>
                </svg>
            ),
            CheckSquare: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                    <polyline points="9 11 12 14 22 4"></polyline>
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                </svg>
            ),
            Code: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                    <polyline points="16 18 22 12 16 6"></polyline>
                    <polyline points="8 6 2 12 8 18"></polyline>
                </svg>
            ),
            ChevronRight: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            ),
            ChevronLeft: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            ),
            ChevronDown: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            ),
        };

        const CodeBlock = ({ title, code }) => {
            const [copied, setCopied] = useState(false);

            const handleCopy = () => {
                navigator.clipboard.writeText(code);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="code-block my-4">
                    <div className="bg-gray-800 px-4 py-3 flex justify-between items-center border-b border-gray-700">
                        <span className="text-xs text-gray-400 font-mono flex items-center gap-2">
                            <i className="fab fa-python text-yellow-400"></i>{title}
                        </span>
                        <button
                            onClick={handleCopy}
                            className="text-xs text-gray-400 hover:text-white transition-colors flex items-center gap-2"
                        >
                            {copied ? (
                                <>
                                    <i className="fas fa-check text-green-400"></i>
                                    <span className="text-green-400">¡Copiado!</span>
                                </>
                            ) : (
                                <>
                                    <i className="far fa-clipboard"></i>
                                    <span>Copiar</span>
                                </>
                            )}
                        </button>
                    </div>
                    <pre className="text-sm"><code dangerouslySetInnerHTML={{__html: code}} /></pre>
                </div>
            );
        };

        const SectionHeader = ({ title, icon: Icon }) => (
            <div className="flex items-center gap-3 mb-6 border-b border-gray-200 pb-4">
                <div className="gradient-usta p-3 rounded-xl shadow-md text-white">
                    {Icon && <Icon size={24} />}
                </div>
                <h2 className="text-3xl font-bold text-gray-900">{title}</h2>
            </div>
        );

        const EndpointCard = ({ method, path, description, status }) => {
            const colors = {
                GET: 'bg-blue-100 text-blue-700',
                POST: 'bg-green-100 text-green-700',
                PUT: 'bg-yellow-100 text-yellow-700',
                DELETE: 'bg-red-100 text-red-700',
            };

            return (
                <div className="card-usta p-4 mb-3">
                    <div className="flex items-start justify-between gap-4">
                        <div className="flex-1">
                            <div className="flex items-center gap-2 mb-2">
                                <span className={`${colors[method]} px-2 py-1 rounded text-xs font-bold`}>{method}</span>
                                <code className="text-sm font-mono text-primary">{path}</code>
                            </div>
                            <p className="text-sm text-gray-600">{description}</p>
                        </div>
                        {status && (
                            <span className={`status-badge ${status === 'done' ? 'status-done' : 'status-pending'}`}>
                                {status === 'done' ? '✅ Hecho' : '⏳ Pending'}
                            </span>
                        )}
                    </div>
                </div>
            );
        };

        const ChecklistItem = ({ completed, title, description }) => (
            <div className="flex items-start gap-3 p-3 mb-2 rounded-lg hover:bg-gray-50 transition-colors">
                <div className={`flex-shrink-0 w-6 h-6 rounded border-2 flex items-center justify-center text-sm ${completed ? 'bg-green-100 border-green-500' : 'border-gray-300'}`}>
                    {completed && <i className="fas fa-check text-green-600"></i>}
                </div>
                <div className="flex-1">
                    <p className={`font-semibold text-sm ${completed ? 'text-gray-600 line-through' : 'text-gray-900'}`}>{title}</p>
                    {description && <p className="text-xs text-gray-500 mt-0.5">{description}</p>}
                </div>
            </div>
        );

        const Accordion = ({ title, children, icon }) => {
            const [open, setOpen] = useState(false);

            return (
                <div className="card-usta mb-3 overflow-hidden">
                    <button
                        onClick={() => setOpen(!open)}
                        className="w-full px-4 py-3 flex items-center justify-between hover:bg-gray-50 transition-colors"
                    >
                        <div className="flex items-center gap-3 text-left flex-1">
                            {icon && <span className="text-xl">{icon}</span>}
                            <span className="font-semibold text-gray-900">{title}</span>
                        </div>
                        <Icons.ChevronDown size={20} className={`transition-transform ${open ? 'rotate-180' : ''}`} />
                    </button>
                    {open && <div className="border-t border-gray-200 px-4 py-3 bg-gray-50/50 text-sm text-gray-700">{children}</div>}
                </div>
            );
        };

        // Detecta tipo de CSV leyendo el encabezado (primera línea) con FileReader
        const detectCsvType = (f) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const firstLine = e.target.result.split('\n')[0] || '';
                const headers = firstLine.split(',').map(h => h.trim().replace(/^"|"$/g, '').toUpperCase());
                const cnpvCols = ['U_DPTO', 'VA1_ESTRATO', 'COD_ENCUESTAS', 'U_VIVIENDA'];
                const encCols  = ['NOMBRE', 'EDAD', 'ESTRATO', 'DEPARTAMENTO'];
                if (cnpvCols.every(c => headers.includes(c))) return resolve('cnpv');
                if (encCols.every(c => headers.includes(c)))  return resolve('encuestas');
                resolve('desconocido');
            };
            reader.readAsText(f.slice(0, 512)); // solo primer bloque
        });

        const LiveTestSection = () => {
            const [file, setFile] = useState(null);
            const [csvType, setCsvType] = useState(null); // 'cnpv' | 'encuestas' | 'desconocido'
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [maxFilas, setMaxFilas] = useState(5000);

            const handleFileChange = async (e) => {
                const f = e.target.files[0];
                setFile(f);
                setError(null);
                setResult(null);
                setCsvType(null);
                if (f) {
                    const tipo = await detectCsvType(f);
                    setCsvType(tipo);
                    if (tipo === 'desconocido') {
                        setError('CSV no reconocido. Use CNPV2018_1VIV_A2_11.CSV o encuestas_demo.csv');
                    }
                }
            };

            const formatDetail = (detail) => {
                if (typeof detail === 'string') return detail;
                if (detail && detail.mensaje) {
                    const faltantes = detail.faltantes ? ` (faltan: ${detail.faltantes.join(', ')})` : '';
                    return detail.mensaje + faltantes;
                }
                return JSON.stringify(detail);
            };

            const handleUpload = async () => {
                if (!file) { setError('Por favor seleccione un archivo CSV'); return; }
                if (csvType === 'desconocido') { setError('Archivo no soportado. Use CNPV o encuestas_demo.'); return; }

                setLoading(true);
                setError(null);
                setResult(null);

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 90000);

                try {
                    const formData = new FormData();
                    formData.append('file', file);

                    let url;
                    if (csvType === 'cnpv') {
                        url = 'http://127.0.0.1:8000/datasets/cnpv/analizar/?max_filas=' + maxFilas;
                    } else {
                        url = 'http://127.0.0.1:8000/encuestas/csv/';
                    }

                    const response = await fetch(url, { method: 'POST', body: formData, signal: controller.signal });
                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(formatDetail(errorData.detail) || 'Error en la API');
                    }

                    const data = await response.json();
                    setResult({ ...data, _tipo: csvType });
                } catch (err) {
                    clearTimeout(timeoutId);
                    if (err.name === 'AbortError') {
                        setError('Tiempo agotado (90s). Intente con menos filas (ej: 1000).');
                    } else {
                        setError(err.message || '¿Está corriendo el servidor en http://127.0.0.1:8000?');
                    }
                } finally {
                    setLoading(false);
                }
            };

            const typeBadge = {
                cnpv:        { label: '📊 CSV CNPV detectado',       cls: 'bg-blue-50 border-blue-300 text-blue-800' },
                encuestas:   { label: '📋 CSV Encuestas detectado',  cls: 'bg-green-50 border-green-300 text-green-800' },
                desconocido: { label: '⚠️ Formato no reconocido',    cls: 'bg-yellow-50 border-yellow-300 text-yellow-800' },
            };

            return (
                <div className="space-y-6">
                    <p className="text-gray-700">
                        Suba <strong>cualquier CSV compatible</strong>: <code className="bg-gray-100 px-1 rounded text-xs">CNPV2018_1VIV_A2_11.CSV</code> o <code className="bg-gray-100 px-1 rounded text-xs">encuestas_demo.csv</code>. El tipo se detecta automáticamente.
                    </p>

                    <div className="grid md:grid-cols-2 gap-6">
                        {/* Panel de Upload */}
                        <div className="card-usta p-6">
                            <h4 className="font-bold text-lg mb-4 text-primary flex items-center gap-2">
                                <i className="fas fa-file-upload"></i> Cargar Archivo
                            </h4>

                            <div className="space-y-4">
                                <div className="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-secondary transition-colors cursor-pointer"
                                    onClick={() => document.getElementById('file-input').click()}
                                >
                                    <input id="file-input" type="file" accept=".csv,.CSV"
                                        onChange={handleFileChange} style={{ display: 'none' }} />
                                    <i className="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                                    <p className="text-sm font-semibold text-gray-700">
                                        {file ? file.name : 'Haga clic o arrastre un CSV aquí'}
                                    </p>
                                    <p className="text-xs text-gray-500 mt-1">CNPV2018_1VIV_A2_11.CSV · encuestas_demo.csv</p>
                                </div>

                                {csvType && (
                                    <div className={`border rounded-lg px-3 py-2 text-sm font-semibold ${typeBadge[csvType].cls}`}>
                                        {typeBadge[csvType].label}
                                        {csvType === 'cnpv' && <span className="font-normal ml-1">→ /datasets/cnpv/analizar/</span>}
                                        {csvType === 'encuestas' && <span className="font-normal ml-1">→ /encuestas/csv/</span>}
                                    </div>
                                )}

                                {csvType === 'cnpv' && (
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">
                                            <i className="fas fa-sliders-h"></i> Máx. filas a procesar:
                                        </label>
                                        <input type="number" value={maxFilas}
                                            onChange={(e) => setMaxFilas(parseInt(e.target.value) || 1000)}
                                            min="100" step="1000"
                                            className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" />
                                        <p className="text-xs text-gray-500 mt-1">1 000–5 000 para demo rápida.</p>
                                    </div>
                                )}

                                <button onClick={handleUpload} disabled={!file || loading || csvType === 'desconocido'}
                                    className={`w-full py-2 rounded-lg font-semibold text-white transition-all ${loading || csvType === 'desconocido' ? 'opacity-50 cursor-not-allowed' : 'hover:scale-105'}`}
                                    style={{ background: (loading || csvType === 'desconocido') ? '#999' : 'linear-gradient(140deg, #3D008D, #ED1E79)' }}
                                >
                                    {loading ? (<><i className="fas fa-spinner fa-spin mr-2"></i>Procesando...</>)
                                             : (<><i className="fas fa-rocket mr-2"></i>Ejecutar Análisis</>)}
                                </button>
                            </div>
                        </div>

                        {/* Panel de Resultados */}
                        <div className="card-usta p-6">
                            <h4 className="font-bold text-lg mb-4 text-secondary flex items-center gap-2">
                                <i className="fas fa-chart-bar"></i> Resultados
                            </h4>

                            {error && (
                                <div className="bg-red-50 border border-red-200 rounded-lg p-3 mb-4 text-sm text-red-700">
                                    <i className="fas fa-exclamation-circle mr-2"></i>{error}
                                </div>
                            )}

                            {result && result._tipo === 'cnpv' && (
                                <div className="space-y-3 text-sm">
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-center">
                                            <p className="text-xs text-blue-600">Filas procesadas</p>
                                            <p className="font-bold text-blue-900 text-lg">{(result.filas_procesadas||0).toLocaleString()}</p>
                                        </div>
                                        <div className="bg-green-50 border border-green-200 rounded-lg p-3 text-center">
                                            <p className="text-xs text-green-600">Válidas</p>
                                            <p className="font-bold text-green-900 text-lg">{(result.filas_validas||0).toLocaleString()}</p>
                                        </div>
                                    </div>
                                    <div>
                                        <h5 className="font-semibold text-gray-700 mb-1"><i className="fas fa-map-marker-alt mr-1"></i>Top Dptos.</h5>
                                        <div className="max-h-40 overflow-y-auto bg-gray-50 p-2 rounded border border-gray-200 text-xs">
                                            {Object.entries(result.distribucion_u_dpto || {}).slice(0, 12).map(([d, c]) => (
                                                <div key={d} className="flex justify-between py-0.5 border-b border-gray-100 last:border-0">
                                                    <span>{d}</span><span className="font-bold text-primary">{c}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <h5 className="font-semibold text-gray-700 mb-1"><i className="fas fa-layer-group mr-1"></i>Por Estrato</h5>
                                        <div className="grid grid-cols-3 gap-1">
                                            {Object.entries(result.distribucion_estrato || {}).sort().map(([e, c]) => (
                                                <div key={e} className="bg-purple-50 border border-purple-200 rounded p-1 text-center text-xs">
                                                    <p className="text-gray-500">Est. {e}</p><p className="font-bold text-purple-700">{c}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    {result.filas_invalidas > 0 && (
                                        <p className="text-xs text-orange-600"><i className="fas fa-exclamation-triangle mr-1"></i>{result.filas_invalidas} filas con errores</p>
                                    )}
                                </div>
                            )}

                            {result && result._tipo === 'encuestas' && (
                                <div className="space-y-3 text-sm">
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-green-50 border border-green-200 rounded-lg p-3 text-center">
                                            <p className="text-xs text-green-600">Encuestas creadas</p>
                                            <p className="font-bold text-green-900 text-lg">{result.encuestas_creadas}</p>
                                        </div>
                                        <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-center">
                                            <p className="text-xs text-blue-600">Filas leídas</p>
                                            <p className="font-bold text-blue-900 text-lg">{result.total_filas_leidas}</p>
                                        </div>
                                    </div>
                                    {result.total_filas_con_error > 0 && (
                                        <div className="bg-orange-50 border border-orange-200 rounded-lg p-3 text-xs">
                                            <p className="font-semibold text-orange-700 mb-1"><i className="fas fa-exclamation-triangle mr-1"></i>{result.total_filas_con_error} filas con error:</p>
                                            {(result.errores || []).slice(0, 3).map((e, i) => (
                                                <p key={i} className="text-orange-600">Fila {e.fila}: {e.error}</p>
                                            ))}
                                        </div>
                                    )}
                                    {result.total_filas_con_error === 0 && (
                                        <div className="bg-green-50 border border-green-200 rounded-lg p-3 text-xs text-green-700">
                                            <i className="fas fa-check-circle mr-1"></i>Todas las filas se importaron sin errores.
                                        </div>
                                    )}
                                    <p className="text-xs text-gray-500">Las encuestas están ahora en memoria. Use GET /encuestas/ para consultarlas.</p>
                                </div>
                            )}

                            {!result && !error && (
                                <div className="text-center py-8">
                                    <i className="fas fa-chart-line text-4xl text-gray-300 mb-2"></i>
                                    <p className="text-gray-500 text-sm">Los resultados aparecerán aquí</p>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="chip-box p-4 rounded-lg">
                        <h5 className="font-bold text-primary mb-2 flex items-center gap-2">
                            <i className="fas fa-info-circle"></i> Archivos compatibles
                        </h5>
